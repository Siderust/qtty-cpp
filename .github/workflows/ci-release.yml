name: CI Release

on:
  workflow_call:
    secrets:
      GITHUB_TOKEN:
        required: false

jobs:
  release:
    name: GitHub Release + APT/RPM repositories
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: qtty-cpp-deb
          path: dist/

      - name: Download RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: qtty-cpp-rpm
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install repository tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            createrepo-c

      - name: Generate APT repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/apt
          cp dist/*.deb site/apt/

          cd site/apt
          dpkg-scanpackages . /dev/null | gzip -9c > Packages.gz

      - name: Generate RPM repository
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/rpm
          cp dist/*.rpm site/rpm/

          createrepo_c site/rpm

      - name: Add custom domain
        if: ${{ vars.PAGES_DOMAIN != '' }}
        shell: bash
        run: |
          echo "${{ vars.PAGES_DOMAIN }}" > site/CNAME

      - name: Publish APT/RPM repositories to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          keep_files: true
          cname: ${{ vars.PAGES_DOMAIN }}